<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reconocimientos | Patronato Zacualpan</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="site-header">

<div class="header-container">

<div class="brand">

<img
src="assets/logos/logo-patronato.png"
alt="Logo"
class="brand-logo"
>

<div>

<p class="brand-small">
Mesa Directiva
</p>

<h1>
Reconocimientos
</h1>

</div>

</div>

<nav class="main-nav">

<a href="panel.html">
Panel
</a>

<a href="index.html">
Inicio
</a>

<button
id="btnCerrarSesion"
class="nav-button"
>
Cerrar sesión
</button>

</nav>

</div>

</header>

<main>

<section class="section">

<div class="section-container">

<p class="section-label">
Gratitud Ciudadana
</p>

<h2>
Reconocimientos y Donaciones en Especie
</h2>

<div class="info-card">

<form id="formReconocimiento">

<h3>
Nuevo reconocimiento ciudadano
</h3>

<label>
Nombre del benefactor
</label>

<input
type="text"
id="nombreBenefactor"
required
>

<label>
Empresa u organización
</label>

<input
type="text"
id="empresaBenefactor"
>

<label>
Teléfono
</label>

<input
type="text"
id="telefonoBenefactor"
>

<label>
Tipo de apoyo
</label>

<select id="tipoApoyo">

<option value="equipo">
Equipo
</option>

<option value="herramienta">
Herramienta
</option>

<option value="servicio">
Servicio
</option>

<option value="combustible">
Combustible
</option>

<option value="material">
Material
</option>

<option value="otro">
Otro
</option>

</select>

<label>
Artículo o apoyo recibido
</label>

<input
type="text"
id="articuloDonado"
required
>

<label>
Descripción
</label>

<textarea
id="descripcionApoyo"
rows="4"
></textarea>

<label>
Valor estimado
</label>

<input
type="number"
id="valorEstimado"
min="0"
step="0.01"
>

<label>
Fotografía del benefactor
</label>

<input
type="file"
id="fotoBenefactor"
accept="image/*"
>

<label>
Fotografía del apoyo recibido
</label>

<input
type="file"
id="fotoApoyo"
accept="image/*"
>

<label>

<input
type="checkbox"
id="publicarNombre"
checked
>

Autoriza publicar nombre

</label>

<label>

<input
type="checkbox"
id="publicarFotoBenefactor"
checked
>

Autoriza publicar fotografía personal

</label>

<label>

<input
type="checkbox"
id="publicarFotoApoyo"
checked
>

Autoriza publicar fotografía del apoyo

</label>

<label>
Mensaje de agradecimiento
</label>

<textarea
id="mensajeAgradecimiento"
rows="5"
></textarea>

<label>

<input
type="checkbox"
id="destacado"
>

Reconocimiento destacado

</label>

<button
type="submit"
class="btn-primary"
>

Guardar reconocimiento

</button>

</form>

</div>

</section>

</main>

<script src="configuracion-firebase.js"></script>
<script src="reconocimientos_admin.js"></script>
</body>

</html>
