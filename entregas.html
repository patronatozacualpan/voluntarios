<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Entregas Operativas | PCZ
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

<header class="site-header">

  <div class="header-container">

    <div class="brand">

      <img
        src="assets/logos/logo-patronato.png"
        class="brand-logo"
      >

      <div>

        <p class="brand-small">
          Protección Civil
        </p>

        <h1>
          Entregas Operativas
        </h1>

      </div>

    </div>

    <nav class="main-nav">

      <a href="panel.html">
        Panel
      </a>

      <a href="inventario.html">
        Inventario
      </a>

      <a
        href="#"
        id="btnCerrarSesion"
      >
        Cerrar sesión
      </a>

    </nav>

  </div>

</header>

<main class="page-section">

  <section class="dashboard-section">

    <div class="section-header">

      <span class="section-badge">
        OPERATIVO
      </span>

      <h2>
        Equipos pendientes de entrega
      </h2>

        Validación operativa de equipo recibido.
      </p>

    <div
      id="contenedorEntregas"
      class="inventory-grid"

      <div class="info-card">

        <h3>
          Cargando entregas...
        </h3>

      </div>

    </div>

  </section>

</main>

<footer class="site-footer">

  <div class="footer-container">

    <p>
      <strong>
        Patronato Zacualpan
      </strong>
    </p>
